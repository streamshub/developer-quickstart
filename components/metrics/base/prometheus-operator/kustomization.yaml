apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - https://github.com/prometheus-operator/prometheus-operator/releases/download/v0.89.0/bundle.yaml
  - namespace.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: streamshub-developer-quickstart
    includeSelectors: false

patches:
  - target:
      kind: ClusterRoleBinding
      name: prometheus-operator
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: monitoring
  - target:
      kind: Deployment
      name: prometheus-operator
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: prometheus-operator
      spec:
        template:
          spec:
            containers:
              - name: prometheus-operator
                resources:
                  requests:
                    cpu: 200m
                    memory: 256Mi
                  limits:
                    cpu: 200m
                    memory: 256Mi
