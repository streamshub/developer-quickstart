apiVersion: v1
kind: Secret
metadata:
  name: kubernetes-scrape-configs
type: Opaque
stringData:
  prometheus-additional.yaml: |
    - job_name: kubernetes-cadvisor
      honor_labels: true
      scrape_interval: 10s
      scrape_timeout: 10s
      metrics_path: /metrics/cadvisor
      scheme: https
      kubernetes_sd_configs:
        - role: node
          namespaces:
            names: []
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        insecure_skip_verify: true
      relabel_configs:
        - separator: ;
          regex: __meta_kubernetes_node_label_(.+)
          replacement: $1
          action: labelmap
        - separator: ;
          regex: (.*)
          target_label: __address__
          replacement: kubernetes.default.svc:443
          action: replace
        - source_labels: [__meta_kubernetes_node_name]
          separator: ;
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
          action: replace
        - source_labels: [__meta_kubernetes_node_name]
          separator: ;
          regex: (.*)
          target_label: node_name
          replacement: $1
          action: replace
        - source_labels: [__meta_kubernetes_node_address_InternalIP]
          separator: ;
          regex: (.*)
          target_label: node_ip
          replacement: $1
          action: replace
      metric_relabel_configs:
        - source_labels: [__name__]
          separator: ;
          regex: container_(network_tcp_usage_total|tasks_state|memory_failures_total|network_udp_usage_total)
          replacement: $1
          action: drop
        # On minikube/Docker, cAdvisor does not populate the container label.
        # Set container="kafka" for pod-level Kafka metrics so the console can
        # match them. On containerd clusters, container is already set and this
        # rule will not match.
        - source_labels: [container, namespace, pod]
          separator: ;
          regex: ;kafka;(.+-.+-\d+)
          target_label: container
          replacement: kafka
          action: replace

    - job_name: kubernetes-nodes-kubelet
      scrape_interval: 10s
      scrape_timeout: 10s
      scheme: https
      kubernetes_sd_configs:
        - role: node
          namespaces:
            names: []
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        insecure_skip_verify: true
      relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/${1}/proxy/metrics
